name: Build SM89 Monograph PDF

on:
  push:
    branches: [main]
    paths:
      - 'src/sass_re/tex/**'
      - 'src/sass_re/processed/**'
      - '.github/workflows/monograph.yml'
  pull_request:
    paths:
      - 'src/sass_re/tex/**'
      - 'src/sass_re/processed/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pictures \
            lmodern

      - name: Build monograph PDF
        working-directory: src/sass_re/tex
        run: |
          mkdir -p build
          # Three passes for cross-references and table of contents
          pdflatex -interaction=nonstopmode -output-directory=build sm89_monograph.tex
          pdflatex -interaction=nonstopmode -output-directory=build sm89_monograph.tex
          pdflatex -interaction=nonstopmode -output-directory=build sm89_monograph.tex

      - name: Verify zero warnings and errors
        working-directory: src/sass_re/tex
        run: |
          warnings=$(grep -c 'LaTeX Warning' build/sm89_monograph.log || true)
          errors=$(grep -c '^! ' build/sm89_monograph.log || true)
          echo "Warnings: $warnings"
          echo "Errors: $errors"
          if [ "$errors" -gt 0 ]; then
            echo "::error::LaTeX produced $errors error(s)"
            grep '^! ' build/sm89_monograph.log
            exit 1
          fi
          if [ "$warnings" -gt 0 ]; then
            echo "::warning::LaTeX produced $warnings warning(s)"
            grep 'LaTeX Warning' build/sm89_monograph.log
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: SM89_Lions_Commentary
          path: src/sass_re/tex/build/sm89_monograph.pdf
          retention-days: 90

      - name: Attach PDF to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          cp src/sass_re/tex/build/sm89_monograph.pdf \
             "SM89_Lions_Commentary_${tag}.pdf"
          gh release upload "$tag" "SM89_Lions_Commentary_${tag}.pdf" \
             --clobber

